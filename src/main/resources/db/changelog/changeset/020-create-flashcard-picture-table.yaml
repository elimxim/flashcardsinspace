databaseChangeLog:
  - changeSet:
      id: 020-create-flashcard-picture-table
      author: elimxim
      changes:
        - createTable:
            tableName: flashcard_picture
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: side
                  type: VARCHAR(10)
                  constraints:
                    nullable: false
              - column:
                  name: mime_type
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: picture_data
                  type: BYTEA
                  constraints:
                    nullable: false
              - column:
                  name: picture_size
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: width
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: height
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: flashcard_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_flashcard_picture_2_flashcard_id
                    references: flashcard(id)
                    validateForeignKey: true
              - column:
                  name: uploaded_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
        - createIndex:
            tableName: flashcard_picture
            indexName: idx_flashcard_picture_flashcard_id
            columns:
              - column:
                  name: flashcard_id
